version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: shok_taxi_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Nodir1998
      POSTGRES_DB: shok_taxi
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/migrations/001_initial.sql:/docker-entrypoint-initdb.d/001_initial.sql
    restart: unless-stopped

volumes:
  postgres_data:
